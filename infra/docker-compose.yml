services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: workwell
      POSTGRES_USER: workwell
      POSTGRES_PASSWORD: workwell
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workwell -d workwell"]
      interval: 5s
      timeout: 5s
      retries: 10

  hapi-fhir:
    image: hapiproject/hapi:latest
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      hapi.fhir.fhir_version: R4

  # ICE — HLN's Immunization Calculation Engine (ACIP forecasting), ADR-029. A long-lived sidecar:
  # ~2-3 GB RAM and a tens-of-seconds Drools cold start, so it is never started per request. The
  # backend reaches it via WORKWELL_IMMZ_ICE_BASE_URL below; with that var unset the simulated
  # forecaster serves instead and this service is not required (inert-unless-configured).
  ice:
    image: hlnconsulting/ice:latest
    restart: unless-stopped
    ports:
      - "32775:8080"
    deploy:
      resources:
        limits:
          memory: 3g

  # WebChart dev database + the wcdb-fhir-shim FHIR facade over it (ADR-034, #309 — the 2026-07-19
  # Doug directive). Profile-gated: `docker compose --profile wcdb up -d wcdb wcdb-fhir-shim` — the
  # default stack is byte-identical without the profile. Synthetic dev data only; never deployed.
  wcdb:
    image: ghcr.io/mieweb/dev-wcdb:latest
    profiles: [wcdb]
    restart: unless-stopped
    ports:
      - "127.0.0.1:33306:3306" # loopback-only: root + published dev password must not face the LAN
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -ppmg2bhok --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  wcdb-fhir-shim:
    build:
      context: ../wcdb-fhir-shim
    profiles: [wcdb]
    restart: unless-stopped
    environment:
      WCDB_HOST: wcdb
      WCDB_PORT: "3306"
    ports:
      - "127.0.0.1:8085:8085" # loopback-only: the shim is unauthenticated by design

    depends_on:
      wcdb:
        condition: service_healthy

  backend:
    build:
      context: ..
      dockerfile: infra/backend.Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/workwell?user=workwell&password=workwell
      DATABASE_URL_DIRECT: jdbc:postgresql://postgres:5432/workwell?user=workwell&password=workwell
      OPENAI_API_KEY: local-dev-placeholder
      # Real ACIP forecasts from the ice sidecar above (ADR-029). Remove this line to fall back to
      # the simulated forecaster. No API key — a self-hosted sidecar has none.
      WORKWELL_IMMZ_ICE_BASE_URL: http://ice:8080/opencds-decision-support-service
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      ice:
        condition: service_started

  frontend:
    build:
      context: ..
      dockerfile: infra/frontend.Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
