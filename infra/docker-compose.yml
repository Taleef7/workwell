services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: workwell
      POSTGRES_USER: workwell
      POSTGRES_PASSWORD: workwell
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  hapi-fhir:
    image: hapiproject/hapi:latest
    ports:
      - "8081:8080"

  backend:
    build:
      context: ../backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/workwell
      SPRING_DATASOURCE_USERNAME: workwell
      SPRING_DATASOURCE_PASSWORD: workwell
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  frontend:
    build:
      context: ../frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
