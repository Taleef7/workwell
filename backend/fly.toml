# fly.toml app configuration file generated for workwell-measure-studio-api on 2026-05-02T16:50:22-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'workwell-measure-studio-api'
primary_region = 'ord'

[build]
  dockerfile = '../infra/backend.Dockerfile'

[env]
  JAVA_OPTS = '-Xmx384m -Xss256k'
  SPRING_PROFILES_ACTIVE = 'prod'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/actuator/health'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
