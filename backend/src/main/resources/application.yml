spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/workwell}
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-5.4-nano
          temperature: 0.3
          max-tokens: 1000
  flyway:
    enabled: true
    url: ${DATABASE_URL_DIRECT:${DATABASE_URL:jdbc:postgresql://localhost:5432/workwell}}
management:
  endpoints:
    web:
      exposure:
        include: health

workwell:
  auth:
    enabled: ${WORKWELL_AUTH_ENABLED:true}
    jwt-secret: ${WORKWELL_AUTH_JWT_SECRET:workwell-demo-secret-change-me}
  cors:
    allowed-origins: ${WORKWELL_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  demo:
    enabled: ${WORKWELL_DEMO_ENABLED:false}
    allow-public-demo: ${WORKWELL_DEMO_ALLOW_PUBLIC_DEMO:false}
  evaluation:
    compliance-rates:
      audiogram: 0.78
      tb_surveillance: 0.91
      hazwoper: 0.65
      flu_vaccine: 0.84
  scheduler:
    enabled: ${WORKWELL_SCHEDULER_ENABLED:true}
    cron: ${WORKWELL_SCHEDULER_CRON:0 0 2 * * *}
  ai:
    openai:
      fallback-model: gpt-4o-mini

