spring.ai.openai.api-key=test-key-for-context-bootstrap
spring.ai.openai.chat.options.model=gpt-5.4-nano
workwell.ai.openai.fallback-model=gpt-4o-mini

workwell.auth.enabled=false

# The test suite issues far more than 200 requests/min per JVM through MockMvc;
# rate limiting is exercised by a dedicated test that re-enables it explicitly.
workwell.ratelimit.enabled=false
