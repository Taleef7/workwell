name: Deploy TWH OS MIEWeb

# Issue #109 — blue-green flip (PR3). The frontend (twh.os.mieweb.org) now points at the de-Java
# TypeScript backend twh-api-ts.os.mieweb.org, which is built + deployed on every push to main from
# backend-ts/ (the same image proven by the shadow workflow). The Java backend (twh-api) is STILL
# built + deployed here as the instant rollback target — nothing destroys it. Rollback = repoint the
# frontend back to ${BACKEND_URL} (revert the two NEXT_PUBLIC_API_* lines) and redeploy the frontend;
# the Java container is already running and current. JVM retirement (drop the Java jobs) is PR4.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      replace_existing:
        description: Delete and recreate existing MIE containers if the hostnames already exist.
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: deploy-twh-mieweb-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  # Java backend (rollback target — still built + deployed; retired in PR4).
  BACKEND_IMAGE: ghcr.io/taleef7/workwell-api
  BACKEND_URL: https://twh-api.os.mieweb.org
  API_HOSTNAME: twh-api
  # TypeScript backend (the live primary the frontend points at).
  BACKEND_TS_IMAGE: ghcr.io/taleef7/workwell-api-ts
  BACKEND_TS_URL: https://twh-api-ts.os.mieweb.org
  API_TS_HOSTNAME: twh-api-ts
  FRONTEND_IMAGE: ghcr.io/taleef7/workwell-twh-frontend
  FRONTEND_URL: https://twh.os.mieweb.org
  FRONTEND_HOSTNAME: twh
  SITE_ID: 1
  APP_NAME: "WorkWell TWH"
  APP_TAGLINE: "Total Worker Health — safety and wellness unified."
  APP_DESCRIPTION: "Eight measures (OSHA safety + wellness), complete case management, and a full audit trail — one reviewable dashboard."

jobs:
  build-backend:
    name: Build backend image (Java — rollback)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }}

  build-backend-ts:
    name: Build backend-ts image (TypeScript — primary)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # The image COPYs both backend-ts/ and the external/mieweb-cloud submodule, so the build context
      # is the repo ROOT and the checkout MUST include the submodule (public mieweb/cloud).
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend-ts/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_TS_IMAGE }}:latest
            ${{ env.BACKEND_TS_IMAGE }}:sha-${{ github.sha }}

  build-frontend:
    name: Build twh frontend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.BACKEND_TS_URL }}
            NEXT_PUBLIC_APP_NAME=${{ env.APP_NAME }}
            NEXT_PUBLIC_APP_TAGLINE=${{ env.APP_TAGLINE }}
            NEXT_PUBLIC_APP_DESCRIPTION=${{ env.APP_DESCRIPTION }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}

  deploy-backend:
    name: Deploy twh backend container (Java — rollback)
    runs-on: ubuntu-latest
    needs: build-backend
    env:
      MIEWEB_API_URL: ${{ secrets.LAUNCHPAD_API_URL }}
      MIEWEB_API_KEY: ${{ secrets.LAUNCHPAD_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL_TWH }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      WORKWELL_AUTH_JWT_SECRET: ${{ secrets.WORKWELL_AUTH_JWT_SECRET_TWH }}
      REPLACE_EXISTING: ${{ github.event_name == 'push' || inputs.replace_existing == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=()
          [ -z "$MIEWEB_API_URL" ] && missing+=("LAUNCHPAD_API_URL")
          [ -z "$MIEWEB_API_KEY" ] && missing+=("LAUNCHPAD_API_KEY")
          [ -z "$DATABASE_URL" ] && missing+=("DATABASE_URL_TWH")
          [ -z "$OPENAI_API_KEY" ] && missing+=("OPENAI_API_KEY")
          [ -z "$WORKWELL_AUTH_JWT_SECRET" ] && missing+=("WORKWELL_AUTH_JWT_SECRET_TWH")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secret(s): ${missing[*]}"
            exit 1
          fi

      - name: Prepare backend environment variables
        id: backend-env
        run: |
          {
            echo 'json<<EOF'
            jq -nc \
              --arg database_url "$DATABASE_URL" \
              --arg openai_api_key "$OPENAI_API_KEY" \
              --arg jwt_secret "$WORKWELL_AUTH_JWT_SECRET" \
              --arg frontend_url "$FRONTEND_URL" \
              '[
                {key: "DATABASE_URL", value: $database_url},
                {key: "OPENAI_API_KEY", value: $openai_api_key},
                {key: "JAVA_OPTS", value: "-Xmx768m -Xms256m -Xss256k"},
                {key: "SPRING_PROFILES_ACTIVE", value: "prod,production"},
                {key: "WORKWELL_CORS_ALLOWED_ORIGINS", value: $frontend_url},
                {key: "CORS_ALLOWED_ORIGINS", value: $frontend_url},
                {key: "WORKWELL_AUTH_COOKIE_SAME_SITE", value: "None"},
                {key: "WORKWELL_AUTH_COOKIE_SECURE", value: "true"},
                {key: "WORKWELL_AUTH_JWT_SECRET", value: $jwt_secret},
                {key: "WORKWELL_AUTH_ACCESS_TTL_SECONDS", value: "2592000"},
                {key: "WORKWELL_INSTANCE", value: "twh"}
              ]'
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Deploy backend through Create-a-Container API
        env:
          CONTAINER_HOSTNAME: ${{ env.API_HOSTNAME }}
          CONTAINER_IMAGE: ${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }}
          INTERNAL_PORT: 8080
          CONTAINER_ENV_VARS_JSON: ${{ steps.backend-env.outputs.json }}
        run: bash .github/scripts/deploy-mieweb-container.sh

  deploy-backend-ts:
    name: Deploy twh-api-ts backend container (TypeScript — primary)
    runs-on: ubuntu-latest
    needs: build-backend-ts
    env:
      MIEWEB_API_URL: ${{ secrets.LAUNCHPAD_API_URL }}
      MIEWEB_API_KEY: ${{ secrets.LAUNCHPAD_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL_TWH }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      WORKWELL_AUTH_JWT_SECRET: ${{ secrets.WORKWELL_AUTH_JWT_SECRET_TWH }}
      REPLACE_EXISTING: ${{ github.event_name == 'push' || inputs.replace_existing == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=()
          [ -z "$MIEWEB_API_URL" ] && missing+=("LAUNCHPAD_API_URL")
          [ -z "$MIEWEB_API_KEY" ] && missing+=("LAUNCHPAD_API_KEY")
          [ -z "$DATABASE_URL" ] && missing+=("DATABASE_URL_TWH")
          [ -z "$OPENAI_API_KEY" ] && missing+=("OPENAI_API_KEY")
          [ -z "$WORKWELL_AUTH_JWT_SECRET" ] && missing+=("WORKWELL_AUTH_JWT_SECRET_TWH")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secret(s): ${missing[*]}"
            exit 1
          fi

      - name: Prepare backend-ts environment variables
        id: backend-ts-env
        # TS production env (cutover plan §7). MIEWEB_TARGET=local → in-process bindings (no companion
        # services, port 8080); DATABASE_URL routes the store factory to the Neon Pg ceiling.
        # WORKWELL_ENVIRONMENT=production keeps the startup-safety fail-fast active. No JAVA_OPTS.
        run: |
          # DATABASE_URL_TWH is the JDBC URL the Java backend uses as spring.datasource.url
          # (jdbc:postgresql://...). node-postgres' pg.Pool needs a postgres:// URI, so strip a leading
          # `jdbc:` (no-op if already a pg URI). Fail legibly on any other scheme.
          db_url="${DATABASE_URL#jdbc:}"
          case "$db_url" in
            postgres://*|postgresql://*) : ;;
            *)
              echo "::error::DATABASE_URL_TWH must be a postgres:// or jdbc:postgresql:// URL." >&2
              exit 1
              ;;
          esac
          if [ "$db_url" != "$DATABASE_URL" ]; then
            echo "Normalized DATABASE_URL: stripped 'jdbc:' prefix for node-postgres (value not logged)."
          fi
          {
            echo 'json<<EOF'
            jq -nc \
              --arg database_url "$db_url" \
              --arg openai_api_key "$OPENAI_API_KEY" \
              --arg jwt_secret "$WORKWELL_AUTH_JWT_SECRET" \
              --arg frontend_url "$FRONTEND_URL" \
              '[
                {key: "MIEWEB_TARGET", value: "local"},
                {key: "WORKWELL_ENVIRONMENT", value: "production"},
                {key: "DATABASE_URL", value: $database_url},
                {key: "OPENAI_API_KEY", value: $openai_api_key},
                {key: "WORKWELL_CORS_ALLOWED_ORIGINS", value: $frontend_url},
                {key: "CORS_ALLOWED_ORIGINS", value: $frontend_url},
                {key: "WORKWELL_AUTH_COOKIE_SAME_SITE", value: "None"},
                {key: "WORKWELL_AUTH_COOKIE_SECURE", value: "true"},
                {key: "WORKWELL_AUTH_JWT_SECRET", value: $jwt_secret},
                {key: "WORKWELL_AUTH_ACCESS_TTL_SECONDS", value: "2592000"},
                {key: "WORKWELL_INSTANCE", value: "twh"}
              ]'
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Deploy backend-ts through Create-a-Container API
        env:
          CONTAINER_HOSTNAME: ${{ env.API_TS_HOSTNAME }}
          CONTAINER_IMAGE: ${{ env.BACKEND_TS_IMAGE }}:sha-${{ github.sha }}
          INTERNAL_PORT: 8080
          CONTAINER_ENV_VARS_JSON: ${{ steps.backend-ts-env.outputs.json }}
        run: bash .github/scripts/deploy-mieweb-container.sh

  deploy-frontend:
    name: Deploy twh frontend container
    runs-on: ubuntu-latest
    # The frontend points at the TS backend, so it deploys after twh-api-ts is up. The Java
    # deploy-backend job runs in parallel (rollback target) and is not a dependency of the frontend.
    needs: [build-frontend, deploy-backend-ts]
    env:
      MIEWEB_API_URL: ${{ secrets.LAUNCHPAD_API_URL }}
      MIEWEB_API_KEY: ${{ secrets.LAUNCHPAD_API_KEY }}
      REPLACE_EXISTING: ${{ github.event_name == 'push' || inputs.replace_existing == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=()
          [ -z "$MIEWEB_API_URL" ] && missing+=("LAUNCHPAD_API_URL")
          [ -z "$MIEWEB_API_KEY" ] && missing+=("LAUNCHPAD_API_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secret(s): ${missing[*]}"
            exit 1
          fi

      - name: Prepare frontend environment variables
        id: frontend-env
        run: |
          {
            echo 'json<<EOF'
            jq -nc \
              --arg backend_url "$BACKEND_TS_URL" \
              '[
                {key: "NODE_ENV", value: "production"},
                {key: "NEXT_PUBLIC_API_URL", value: $backend_url},
                {key: "NEXT_PUBLIC_API_BASE_URL", value: $backend_url}
              ]'
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Deploy frontend through Create-a-Container API
        env:
          CONTAINER_HOSTNAME: ${{ env.FRONTEND_HOSTNAME }}
          CONTAINER_IMAGE: ${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}
          INTERNAL_PORT: 3000
          CONTAINER_ENV_VARS_JSON: ${{ steps.frontend-env.outputs.json }}
        run: bash .github/scripts/deploy-mieweb-container.sh
