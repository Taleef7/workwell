name: Deploy TWH OS MIEWeb

# Issue #109 — sole live stack (post-JVM-retirement, PR4). On every push to main this builds + deploys
# the de-Java TypeScript backend (backend-ts/ → twh-api-ts.os.mieweb.org) and the TWH-branded frontend
# (pointed at it). The Java/Spring backend is retired (backend/ deleted in PR4). Rollback = redeploy an
# earlier known-good twh-api-ts image (workflow_dispatch with replace_existing=true at an earlier SHA;
# each build is tagged sha-<SHA> in GHCR). The self-heal reconciler (reconcile-twh-mieweb.yml) recreates
# a down container from :latest independently of this workflow.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      replace_existing:
        description: Delete and recreate existing MIE containers if the hostnames already exist.
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# Shared with reconcile-twh-mieweb.yml: a constant group (NOT keyed on github.ref) so a deploy and a
# self-heal never run a delete+recreate against the same container at the same time. cancel-in-progress:
# false → the later run queues behind the in-flight one rather than racing or being dropped.
concurrency:
  group: twh-mieweb-container-ops
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  # TypeScript backend — the sole live backend (the frontend points at it).
  BACKEND_TS_IMAGE: ghcr.io/taleef7/workwell-api-ts
  BACKEND_TS_URL: https://twh-api-ts.os.mieweb.org
  API_TS_HOSTNAME: twh-api-ts
  FRONTEND_IMAGE: ghcr.io/taleef7/workwell-twh-frontend
  FRONTEND_URL: https://twh.os.mieweb.org
  FRONTEND_HOSTNAME: twh
  SITE_ID: 1
  APP_NAME: "WorkWell TWH"
  APP_TAGLINE: "Total Worker Health — safety and wellness unified."
  APP_DESCRIPTION: "OSHA safety, clinical wellness, and CMS eCQM measures, complete case management, and a full audit trail — one reviewable dashboard."

jobs:
  build-backend-ts:
    name: Build backend-ts image (TypeScript — primary)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # The image COPYs both backend-ts/ and the external/mieweb-cloud submodule, so the build context
      # is the repo ROOT and the checkout MUST include the submodule (public mieweb/cloud).
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend-ts/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_TS_IMAGE }}:latest
            ${{ env.BACKEND_TS_IMAGE }}:sha-${{ github.sha }}

  build-frontend:
    name: Build twh frontend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.BACKEND_TS_URL }}
            NEXT_PUBLIC_APP_NAME=${{ env.APP_NAME }}
            NEXT_PUBLIC_APP_TAGLINE=${{ env.APP_TAGLINE }}
            NEXT_PUBLIC_APP_DESCRIPTION=${{ env.APP_DESCRIPTION }}
            NEXT_PUBLIC_CODIFY_INDEX_URL=${{ vars.NEXT_PUBLIC_CODIFY_INDEX_URL }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}

  deploy-backend-ts:
    name: Deploy twh-api-ts backend container (TypeScript — primary)
    runs-on: ubuntu-latest
    needs: build-backend-ts
    env:
      MIEWEB_API_URL: ${{ secrets.LAUNCHPAD_API_URL }}
      MIEWEB_API_KEY: ${{ secrets.LAUNCHPAD_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL_TWH }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      WORKWELL_AUTH_JWT_SECRET: ${{ secrets.WORKWELL_AUTH_JWT_SECRET_TWH }}
      # Optional (E14/ADR-023): VSAC/UMLS value-set expansion. Inert when unset — the backend
      # treats a blank key as "not configured" (StoreValueSetResolver only). Set the
      # WORKWELL_VSAC_API_KEY_TWH secret to enable; changes no current measure's outcome (parity-tested).
      WORKWELL_VSAC_API_KEY: ${{ secrets.WORKWELL_VSAC_API_KEY_TWH }}
      # Optional (#167/ADR-030): durable S3 evidence bucket. Inert when unset (all THREE of bucket +
      # key id + secret required) — evidence falls back to the in-container fs BUCKET binding.
      # KEEP IN SYNC with reconcile-twh-mieweb.yml.
      WORKWELL_BUCKET_S3_ACCESS_KEY_ID: ${{ secrets.WORKWELL_BUCKET_S3_ACCESS_KEY_ID_TWH }}
      WORKWELL_BUCKET_S3_SECRET_ACCESS_KEY: ${{ secrets.WORKWELL_BUCKET_S3_SECRET_ACCESS_KEY_TWH }}
      WORKWELL_BUCKET_S3_BUCKET: workwell-twh-evidence
      WORKWELL_BUCKET_S3_REGION: us-east-1
      REPLACE_EXISTING: ${{ github.event_name == 'push' || inputs.replace_existing == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=()
          [ -z "$MIEWEB_API_URL" ] && missing+=("LAUNCHPAD_API_URL")
          [ -z "$MIEWEB_API_KEY" ] && missing+=("LAUNCHPAD_API_KEY")
          [ -z "$DATABASE_URL" ] && missing+=("DATABASE_URL_TWH")
          [ -z "$OPENAI_API_KEY" ] && missing+=("OPENAI_API_KEY")
          [ -z "$WORKWELL_AUTH_JWT_SECRET" ] && missing+=("WORKWELL_AUTH_JWT_SECRET_TWH")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secret(s): ${missing[*]}"
            exit 1
          fi

      - name: Prepare backend-ts environment variables
        id: backend-ts-env
        # TS production env (cutover plan §7). MIEWEB_TARGET=local → in-process bindings (no companion
        # services, port 8080); DATABASE_URL routes the store factory to the Neon Pg ceiling.
        # WORKWELL_ENVIRONMENT=production keeps the startup-safety fail-fast active. No JAVA_OPTS.
        run: |
          # DATABASE_URL_TWH is the JDBC URL the Java backend uses as spring.datasource.url
          # (jdbc:postgresql://...). node-postgres' pg.Pool needs a postgres:// URI, so strip a leading
          # `jdbc:` (no-op if already a pg URI). Fail legibly on any other scheme.
          db_url="${DATABASE_URL#jdbc:}"
          case "$db_url" in
            postgres://*|postgresql://*) : ;;
            *)
              echo "::error::DATABASE_URL_TWH must be a postgres:// or jdbc:postgresql:// URL." >&2
              exit 1
              ;;
          esac
          if [ "$db_url" != "$DATABASE_URL" ]; then
            echo "Normalized DATABASE_URL: stripped 'jdbc:' prefix for node-postgres (value not logged)."
          fi
          {
            echo 'json<<EOF'
            jq -nc \
              --arg database_url "$db_url" \
              --arg openai_api_key "$OPENAI_API_KEY" \
              --arg jwt_secret "$WORKWELL_AUTH_JWT_SECRET" \
              --arg frontend_url "$FRONTEND_URL" \
              --arg vsac_api_key "$WORKWELL_VSAC_API_KEY" \
              --arg bucket_key_id "$WORKWELL_BUCKET_S3_ACCESS_KEY_ID" \
              --arg bucket_secret "$WORKWELL_BUCKET_S3_SECRET_ACCESS_KEY" \
              --arg bucket_name "$WORKWELL_BUCKET_S3_BUCKET" \
              --arg bucket_region "$WORKWELL_BUCKET_S3_REGION" \
              '[
                {key: "MIEWEB_TARGET", value: "local"},
                {key: "WORKWELL_ENVIRONMENT", value: "production"},
                {key: "DATABASE_URL", value: $database_url},
                {key: "OPENAI_API_KEY", value: $openai_api_key},
                {key: "WORKWELL_CORS_ALLOWED_ORIGINS", value: $frontend_url},
                {key: "CORS_ALLOWED_ORIGINS", value: $frontend_url},
                {key: "WORKWELL_AUTH_COOKIE_SAME_SITE", value: "None"},
                {key: "WORKWELL_AUTH_COOKIE_SECURE", value: "true"},
                {key: "WORKWELL_AUTH_JWT_SECRET", value: $jwt_secret},
                {key: "WORKWELL_AUTH_ACCESS_TTL_SECONDS", value: "2592000"},
                {key: "WORKWELL_INSTANCE", value: "twh"},
                {key: "WORKWELL_SCHEDULER_ENABLED", value: "true"},
                {key: "WORKWELL_VSAC_API_KEY", value: $vsac_api_key},
                {key: "WORKWELL_BUCKET_S3_ACCESS_KEY_ID", value: $bucket_key_id},
                {key: "WORKWELL_BUCKET_S3_SECRET_ACCESS_KEY", value: $bucket_secret},
                {key: "WORKWELL_BUCKET_S3_BUCKET", value: $bucket_name},
                {key: "WORKWELL_BUCKET_S3_REGION", value: $bucket_region}
              ]'
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Deploy backend-ts through Create-a-Container API
        env:
          CONTAINER_HOSTNAME: ${{ env.API_TS_HOSTNAME }}
          CONTAINER_IMAGE: ${{ env.BACKEND_TS_IMAGE }}:sha-${{ github.sha }}
          INTERNAL_PORT: 8080
          CONTAINER_ENV_VARS_JSON: ${{ steps.backend-ts-env.outputs.json }}
        run: bash .github/scripts/deploy-mieweb-container.sh

  deploy-frontend:
    name: Deploy twh frontend container
    runs-on: ubuntu-latest
    # Gated on the TS backend deploy SUCCEEDING (default `needs` success gate). The frontend points at
    # ${BACKEND_TS_URL}, and the deploy script deletes-then-recreates the twh-api-ts container — so if
    # that deploy fails, shipping a frontend aimed at a now-dead/old TS backend would only worsen the
    # outage. Skipping here preserves the last-working frontend.
    # Rollback (Java is retired): redeploy an earlier known-good twh-api-ts image — workflow_dispatch
    # with replace_existing=true at an earlier sha-<SHA>. See docs/DEPLOY.md → Rollback.
    needs: [build-frontend, deploy-backend-ts]
    env:
      MIEWEB_API_URL: ${{ secrets.LAUNCHPAD_API_URL }}
      MIEWEB_API_KEY: ${{ secrets.LAUNCHPAD_API_KEY }}
      REPLACE_EXISTING: ${{ github.event_name == 'push' || inputs.replace_existing == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=()
          [ -z "$MIEWEB_API_URL" ] && missing+=("LAUNCHPAD_API_URL")
          [ -z "$MIEWEB_API_KEY" ] && missing+=("LAUNCHPAD_API_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secret(s): ${missing[*]}"
            exit 1
          fi

      - name: Prepare frontend environment variables
        id: frontend-env
        run: |
          {
            echo 'json<<EOF'
            jq -nc \
              --arg backend_url "$BACKEND_TS_URL" \
              '[
                {key: "NODE_ENV", value: "production"},
                {key: "NEXT_PUBLIC_API_URL", value: $backend_url},
                {key: "NEXT_PUBLIC_API_BASE_URL", value: $backend_url}
              ]'
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Deploy frontend through Create-a-Container API
        env:
          CONTAINER_HOSTNAME: ${{ env.FRONTEND_HOSTNAME }}
          CONTAINER_IMAGE: ${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}
          INTERNAL_PORT: 3000
          CONTAINER_ENV_VARS_JSON: ${{ steps.frontend-env.outputs.json }}
        run: bash .github/scripts/deploy-mieweb-container.sh
