name: CI

on:
  push:
    branches: [main, "claude/**", "fix/**", "feat/**", "perf/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-helper:
    name: Deploy helper — Shell test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test bounded MIE manager requests
        run: bash .github/scripts/mieweb-api-request.test.sh

  frontend:
    name: Frontend — Lint, Test, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Unit tests
        run: pnpm test
      - name: Build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://workwell-measure-studio-api.fly.dev
          NEXT_PUBLIC_APP_NAME: WorkWell Measure Studio
          NEXT_PUBLIC_DEMO_MODE: "false"
        run: pnpm build

  backend-ts:
    name: Backend-TS — Typecheck & Test
    runs-on: ubuntu-latest
    # Production runs on the TypeScript backend (backend-ts/), so it must be gated like any other
    # code path. Exercises BOTH the SQLite floor (default) and the Postgres ceiling — the postgres
    # service + WORKWELL_TEST_PG_URL light up the store-contract suite, which otherwise self-skips.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: workwell
          POSTGRES_PASSWORD: workwell
          POSTGRES_DB: workwell
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U workwell"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend-ts
    steps:
      # backend-ts consumes @mieweb/cloud from the external/mieweb-cloud submodule (public mieweb/cloud).
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: backend-ts/pnpm-lock.yaml
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Test (SQLite floor + Postgres ceiling)
        env:
          WORKWELL_TEST_PG_URL: postgres://workwell:workwell@localhost:5432/workwell
        run: pnpm test

  e2e:
    name: Playwright E2E (manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install e2e dependencies
        working-directory: e2e
        run: pnpm install
      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install chromium --with-deps
      - name: Run E2E tests
        working-directory: e2e
        env:
          PLAYWRIGHT_BASE_URL: https://workwell-measure-studio.vercel.app
        run: npx playwright test
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
