name: CI

on:
  push:
    branches: [main, "claude/**", "fix/**", "feat/**", "perf/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — Test (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    defaults:
      run:
        working-directory: backend
    env:
      # Split the CQL-heavy suite across parallel runners; keep this in sync with the
      # length of matrix.shard above. See build.gradle.kts for the hash-based selection.
      TEST_SHARD_TOTAL: "8"
      TEST_SHARD_INDEX: ${{ matrix.shard }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
        with:
          # Only one shard writes the shared Gradle cache to avoid concurrent-write
          # contention; the rest read it.
          cache-read-only: ${{ matrix.shard != 0 }}
      - name: Run backend tests (shard ${{ matrix.shard }}/8)
        run: ./gradlew test --build-cache --no-daemon
      - name: Per-class timings (shard balancing data)
        if: always()
        run: |
          shopt -s nullglob
          for f in build/test-results/test/*.xml; do
            cls=$(basename "$f" .xml); cls=${cls#TEST-}
            t=$(sed -n 's/.*<testsuite[^>]*[[:space:]]time="\([0-9.]*\)".*/\1/p' "$f" | head -1)
            echo "TIMING ${t:-0} ${cls}"
          done | sort -t' ' -k2 -gr
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Backend Tests (shard ${{ matrix.shard }})
          path: backend/build/test-results/test/*.xml
          reporter: java-junit
          # The reporter only publishes annotations; a transient GitHub check-run
          # API 401 ("HttpError: Requires authentication") must not fail the job
          # when the tests themselves passed. The gradle "Run backend tests" step
          # remains the real gate.
          fail-on-error: false

  frontend:
    name: Frontend — Lint, Test, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Unit tests
        run: pnpm test
      - name: Build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://workwell-measure-studio-api.fly.dev
          NEXT_PUBLIC_APP_NAME: WorkWell Measure Studio
          NEXT_PUBLIC_DEMO_MODE: "false"
        run: pnpm build

  backend-ts:
    name: Backend-TS — Typecheck & Test
    runs-on: ubuntu-latest
    # Production runs on the TypeScript backend (backend-ts/), so it must be gated like any other
    # code path. Exercises BOTH the SQLite floor (default) and the Postgres ceiling — the postgres
    # service + WORKWELL_TEST_PG_URL light up the store-contract suite, which otherwise self-skips.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: workwell
          POSTGRES_PASSWORD: workwell
          POSTGRES_DB: workwell
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U workwell"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend-ts
    steps:
      # backend-ts consumes @mieweb/cloud from the external/mieweb-cloud submodule (public mieweb/cloud).
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: backend-ts/pnpm-lock.yaml
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Test (SQLite floor + Postgres ceiling)
        env:
          WORKWELL_TEST_PG_URL: postgres://workwell:workwell@localhost:5432/workwell
        run: pnpm test

  e2e:
    name: Playwright E2E (manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install e2e dependencies
        working-directory: e2e
        run: pnpm install
      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install chromium --with-deps
      - name: Run E2E tests
        working-directory: e2e
        env:
          PLAYWRIGHT_BASE_URL: https://workwell-measure-studio.vercel.app
        run: npx playwright test
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
