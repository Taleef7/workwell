# Nightly logical backup of the live Neon DB (#270 / docs/BACKUP_DR_RUNBOOK.md §2 decision 2).
#
# The live Neon project's PITR window is plan-capped at SIX HOURS (Free plan maximum — verified
# 2026-07-14), and until this workflow existed retention was the ONLY recovery mechanism. This adds
# the second line of defence: a nightly `pg_dump` of the `workwell_spike` schema to the managed S3
# bucket (`workwell-twh-evidence`, prefix `db-dumps/`), giving a recovery path independent of Neon
# retention AND independent of Neon itself. Bucket lifecycle expires dumps after 30 days.
#
# Restore (see BACKUP_DR_RUNBOOK.md §3): download a dump, `pg_restore -d <target> --no-owner
# --schema=workwell_spike <file>` into a fresh Neon project/branch, repoint DATABASE_URL_TWH.
#
# On failure GitHub emails the repo owner (default notification for scheduled-workflow failures).
name: backup-neon-nightly

on:
  schedule:
    - cron: "17 3 * * *" # daily 03:17 UTC — off the :00 spike, after the scheduler's daily run window
  workflow_dispatch:

permissions:
  contents: read
  # Raise an issue when the dump fails. This job is the only always-on process that opens a REAL
  # connection to the REAL database every day, which makes it our de-facto database health check —
  # the 15-minute self-heal reconciler probes /actuator/health, which is deliberately DB-free and
  # therefore cannot detect a database outage (see docs/DEPLOY.md → "Database compute cost").
  issues: write

concurrency:
  group: backup-neon-nightly
  cancel-in-progress: false

jobs:
  dump:
    name: pg_dump workwell_spike → S3
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_TWH }}
      # A DEDICATED backup principal (workwell-twh-backup): PutObject on db-dumps/* only. The app's
      # runtime credentials are a different IAM user that carries an explicit DENY on db-dumps/*,
      # so a compromised app container cannot read/overwrite/delete the dumps (review P2-2).
      AWS_ACCESS_KEY_ID: ${{ secrets.WORKWELL_BACKUP_S3_ACCESS_KEY_ID_TWH }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.WORKWELL_BACKUP_S3_SECRET_ACCESS_KEY_TWH }}
      AWS_DEFAULT_REGION: us-east-1
      BACKUP_BUCKET: workwell-twh-evidence
    steps:
      - name: Validate required secrets
        run: |
          missing=()
          [ -z "$DATABASE_URL" ] && missing+=("DATABASE_URL_TWH")
          [ -z "$AWS_ACCESS_KEY_ID" ] && missing+=("WORKWELL_BACKUP_S3_ACCESS_KEY_ID_TWH")
          [ -z "$AWS_SECRET_ACCESS_KEY" ] && missing+=("WORKWELL_BACKUP_S3_SECRET_ACCESS_KEY_TWH")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secret(s): ${missing[*]}"
            exit 1
          fi

      - name: Ensure pg_dump 16+
        # The Neon server is Postgres 16; pg_dump's major version must be >= the server's.
        run: |
          ok() { pg_dump --version | grep -qE ' (1[6-9]|[2-9][0-9])\.'; }
          if ! ok; then
            sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client-16
          fi
          pg_dump --version
          if ! ok; then
            echo "::error::pg_dump is still older than 16 after install — dump would fail against the PG16 server." >&2
            exit 1
          fi

      - name: Dump the workwell_spike schema
        run: |
          # DATABASE_URL_TWH is the JDBC URL (jdbc:postgresql://...) — strip the prefix for libpq,
          # exactly as deploy-twh-mieweb.yml does. pg_dump must NOT go through the transaction
          # pooler, so also strip Neon's `-pooler` host infix for a direct connection.
          db_url="${DATABASE_URL#jdbc:}"
          case "$db_url" in
            postgres://*|postgresql://*) : ;;
            *)
              echo "::error::DATABASE_URL_TWH must be a postgres:// or jdbc:postgresql:// URL." >&2
              exit 1
              ;;
          esac
          # Anchor the -pooler strip to the HOST portion (first '-pooler.' after the '@'), so a
          # password that happens to contain '-pooler.' is never corrupted (review P3-3).
          direct_url="$(printf '%s' "$db_url" | sed 's/@\([^/@]*\)-pooler\./@\1./')"
          # The JDBC URL uses camelCase query params; libpq wants snake_case (pg_dump rejects
          # "channelBinding" outright — first live run 2026-07-14).
          direct_url="${direct_url/channelBinding=/channel_binding=}"
          pg_dump "$direct_url" --schema=workwell_spike --format=custom --no-owner \
            --file=workwell_spike.dump
          ls -l workwell_spike.dump

      - name: Upload to S3 (db-dumps/, 30-day lifecycle)
        run: |
          stamp="$(date -u +%Y-%m-%dT%H%M%SZ)"
          key="db-dumps/workwell_spike-${stamp}.dump"
          aws s3 cp workwell_spike.dump "s3://${BACKUP_BUCKET}/${key}"
          echo "Uploaded s3://${BACKUP_BUCKET}/${key} ($(stat -c%s workwell_spike.dump) bytes)"

      # ---------------------------------------------------------------------
      # Make a failure impossible to miss (2026-07-22 incident).
      #
      # This job failed five nights running (07-18 → 07-22) while the database was quota-blocked and
      # nobody noticed, because a red scheduled workflow is invisible unless you go looking. It had
      # correctly detected a total production outage on night one. Detection was never the gap —
      # notification was. So: surface it as an open issue, and close it automatically on recovery.
      #
      # Deliberately ONE issue that gets commented on, not a new issue per night — a nightly pile of
      # duplicates is just a different flavour of noise nobody reads.
      # ---------------------------------------------------------------------
      - name: Open or update the backup-failure issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # This job never checks out the repo, so gh has no local git remote to infer the
          # repository from and would exit before it could raise anything — an alerting step that
          # silently fails is worse than none. GH_REPO supplies that context explicitly.
          GH_REPO: ${{ github.repository }}
          TITLE: "Nightly Neon backup is failing"
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          existing="$(gh issue list --state open --search "$TITLE in:title" \
            --json number,title --jq "[.[] | select(.title == env.TITLE)] | .[0].number // empty")"

          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "Still failing — [run ${GITHUB_RUN_ID}](${RUN_URL}) at $(date -u '+%Y-%m-%d %H:%M UTC')."
            echo "Commented on existing issue #${existing}"
          else
            gh issue create --title "$TITLE" --body "$(cat <<EOF
          The nightly \`pg_dump\` of \`workwell_spike\` failed: [run ${GITHUB_RUN_ID}](${RUN_URL}).

          **Treat this as a production incident, not a backup problem.** This job is the only always-on
          process that opens a real connection to the real database, so it is our de-facto database
          health check. The 15-minute self-heal reconciler probes \`/actuator/health\`, which is
          deliberately DB-free and **cannot** detect a database outage — do not "fix" that by adding a
          query to it, or the reconciler becomes a compute-pinning loop (see \`docs/DEPLOY.md\` →
          "Database compute cost").

          Most likely causes, in order:

          1. **Database unreachable** — check the Neon console. A \`402\` in the run log means the compute
             quota is exhausted and *every* DB-backed route is already returning \`internal_error\`.
          2. Rotated/expired \`DATABASE_URL_TWH\` or the backup IAM credentials.
          3. \`pg_dump\` version drift against the server.

          Quick check — if this returns 500s, the live site is down:

          \`\`\`bash
          curl -s -o /dev/null -w '%{http_code}\n' https://twh-api-ts.os.mieweb.org/api/version
          \`\`\`

          This issue closes automatically on the next successful backup.
          EOF
          )"
            echo "Opened a new backup-failure issue"
          fi

      - name: Close the backup-failure issue on recovery
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # See the failure step above: no checkout, so gh needs the repository given to it.
          GH_REPO: ${{ github.repository }}
          TITLE: "Nightly Neon backup is failing"
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          existing="$(gh issue list --state open --search "$TITLE in:title" \
            --json number,title --jq "[.[] | select(.title == env.TITLE)] | .[0].number // empty")"
          if [ -n "$existing" ]; then
            gh issue close "$existing" --comment "Recovered — backup succeeded in [run ${GITHUB_RUN_ID}](${RUN_URL})."
            echo "Closed issue #${existing}"
          else
            echo "No open backup-failure issue; nothing to close."
          fi
